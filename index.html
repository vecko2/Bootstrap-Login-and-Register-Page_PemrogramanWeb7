<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="image"
      href="https://www.its.ac.id/wp-content/uploads/2026/01/rektorat-1024x585.jpg"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-bg">
    <div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
      <div class="card auth-card border-0 shadow-lg">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <span class="badge text-bg-light text-uppercase">Portal Kampus ITS</span>
            <h1 class="auth-title mt-3">Login</h1>
            <p class="text-muted mb-0">Masuk untuk melanjutkan aktivitas.</p>
          </div>
          <form>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="loginUsername" placeholder="Username" />
              <label for="loginUsername">Username</label>
            </div>
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="loginPassword" placeholder="Password" />
              <label for="loginPassword">Password</label>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe" />
                <label class="form-check-label" for="rememberMe">Ingat saya</label>
              </div>
              <a href="#" class="link-secondary text-decoration-none">Lupa password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
          <p class="text-center mt-4 mb-0">
            Belum punya akun?
            <a href="register.html" class="link-primary text-decoration-none fw-semibold">Register</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
